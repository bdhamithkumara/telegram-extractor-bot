name: Telegram Extractor Bot

on:
  push:
    branches: [main]
  workflow_dispatch:          # manual trigger from GitHub UI
  schedule:
    # Restart every 5 h 50 min — stays inside GitHub's 6-hour job limit
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # ~5 h 50 min

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Restore state.json so processed-IDs survive restarts ─────────────
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: state-${{ github.run_id }}
          restore-keys: |
            state-

      # ── 3. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 4. System deps (unrar for RAR extraction) ────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          # Try the non-free unrar first; fall back to p7zip which handles both ZIP and RAR
          sudo apt-get install -y unrar || sudo apt-get install -y p7zip-full
          # Tell rarfile to use 7z if unrar isn't available
          if ! command -v unrar &>/dev/null; then
            echo "RARFILE_TOOL=7z" >> "$GITHUB_ENV"
          fi

      # ── 5. Python deps ───────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements.txt

      # ── 6. Run the bot ───────────────────────────────────────────────────────
      - name: Run bot
        env:
          API_ID:     ${{ secrets.API_ID }}
          API_HASH:   ${{ secrets.API_HASH }}
          BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py